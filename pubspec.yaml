name: fieldmeasure
description: "Instantly estimate object height and distance using your phone as a tool."
publish_to: 'none'

version: 1.2.7+16

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  cupertino_icons: ^1.0.8
  sensors_plus: ^7.0.0
  camera: ^0.11.2
  showcaseview: ^5.0.1
  shared_preferences: ^2.5.3
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  lottie: ^3.1.2
  url_launcher: ^6.3.1
  upgrader: ^12.1.0
  permission_handler: ^11.0.0
  provider: ^6.1.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: RobotoCondensed
      fonts:
        - asset: assets/fonts/RobotoCondensed-VariableFont_wght.ttf
        - asset: assets/fonts/RobotoCondensed-Italic-VariableFont_wght.ttf
          style: italic

flutter_native_splash:
  color: "#212121"
  image: assets/app_logo.png
  android_12:
    color: "#212121"
    image: assets/app_logo_helmet.png
    branding: assets/app_logo_text.png
    icon_background_color: "#212121"
  android_gravity: center
  android: true
  ios: true
  web: false